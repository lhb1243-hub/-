<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>감염 위험 자가 확인</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"맑은 고딕";
}

body{

background:
linear-gradient(
135deg,
#E7FBF6,
#DDF0FF
);

}

.container{

max-width:800px;

margin:40px auto;

padding:20px;

}

.header{

background:
linear-gradient(
135deg,
#1BAE9B,
#2F83D5
);

color:white;

padding:55px;

text-align:center;

border-radius:25px 25px 0 0;

}

.content{

background:white;

padding:35px;

border-radius:0 0 25px 25px;

}

.card{

background:#F7FFFD;

padding:25px;

margin-top:20px;

border-radius:20px;

}

h2{

color:#208B8A;

margin-bottom:15px;

}

input{

width:100%;

padding:15px;

margin-top:10px;

border-radius:10px;

border:1px solid #ddd;

}

button{

width:100%;

padding:16px;

margin-top:20px;

background:#1BAE9B;

color:white;

border:none;

border-radius:15px;

font-size:18px;

cursor:pointer;

}

.result{

margin-top:20px;

padding:20px;

border-radius:15px;

background:#ECFAF7;

}

.tip{

margin-top:10px;

color:#3B5A69;

}

.footer{

margin-top:20px;

font-size:13px;

color:gray;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🚑 감염 예방 도우미</h1>

<p>
증상을 입력하면 참고용 안내와 예방 수칙을 알려드립니다
</p>

</div>

<div class="content">

<div class="card">

<h2>현재 상태 입력</h2>

<input
id="symptom"
placeholder=
"예: 열이 나고 기침이 있어요">

<button onclick="check()">

결과 보기

</button>

<div
class="result"

id="result">

증상을 입력해주세요.

</div>

</div>

</div>

</div>

<script>

function check(){

let text=

document
.getElementById("symptom")

.value
.toLowerCase();

let result="";

if(
text.includes("열")

||
text.includes("기침")

||

text.includes("목")
){

result=
`
<h3>🟡 감염 가능성 고려</h3>

<p>
호흡기 감염과 관련된 증상이 있을 수 있습니다.
정확한 진단은 의료기관에서 확인하세요.
</p>

<div class="tip">

✔ 마스크 착용<br>

✔ 손 씻기<br>

✔ 충분한 휴식

</div>

`;

}

else if(

text.includes("설사")

||

text.includes("복통")

){

result=
`
<h3>🟠 위생 관리 필요</h3>

<p>

소화기 관련 감염 예방 행동을 실천하세요.

</p>

<div class="tip">

✔ 수분 섭취<br>

✔ 음식 위생 관리

</div>

`;

}

else{

result=
`
<h3>🟢 일반 안내</h3>

<p>

입력된 내용만으로는 판단하기 어렵습니다.

</p>

<div class="tip">

✔ 손 위생 유지<br>

✔ 생활 습관 관리

</div>

`;

}

result+=

`

<div class="footer">

※ 교육용 예시이며 진단 기능이 아닙니다.<br>

응급구조사는 현장에서 증상을 빠르게 파악하고 감염 확산을 예방합니다.

</div>

`;

document
.getElementById("result")

.innerHTML

=

result;

}

</script>

</body>

</html>
