<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>오늘 나는 응급구조사</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"맑은 고딕";
}

body{

background:
linear-gradient(
135deg,
#fff2f2,
#eef7ff
);

}

.wrap{

max-width:850px;

margin:40px auto;

}

.hero{

background:
linear-gradient(
135deg,
#ff7373,
#ff5656
);

padding:70px;

color:white;

text-align:center;

border-radius:30px;

}

.card{

background:white;

padding:35px;

margin-top:25px;

border-radius:25px;

box-shadow:0 8px 25px rgba(0,0,0,.08);

}

h2{

color:#e54c4c;

margin-bottom:20px;

}

.choice{

background:#fff6f6;

padding:18px;

margin-top:12px;

border-radius:15px;

cursor:pointer;

transition:.3s;

}

.choice:hover{

transform:translateY(-3px);

}

.result{

margin-top:20px;

padding:20px;

background:#f6fffd;

border-radius:15px;

display:none;

}

.next{

display:none;

margin-top:20px;

}

button{

padding:14px;

width:100%;

border:none;

border-radius:14px;

background:#e54c4c;

color:white;

}

.score{

font-size:22px;

text-align:center;

color:#2b7d72;

}

</style>

</head>

<body>

<div class="wrap">

<div class="hero">

<h1>🚑 오늘 나는 응급구조사</h1>

<p>

당신의 선택이 감염 예방을 바꾼다

</p>

</div>



<div class="card" id="game">

<h2 id="title">

상황 1

</h2>

<p id="story">

점심시간,
친구가 열이 난다고 하며 계속 기침한다.

당신은?

</p>

<div id="choices"></div>

<div

class="result"

id="result">

</div>

<div class="next">

<button onclick="next()">

다음 상황 →

</button>

</div>

</div>

</div>



<script>

let score=0;

let current=0;

const data=[

{

title:"상황 1",

story:
"친구가 열이 나고 기침한다.",

choice:[

"바로 부축한다",

"손 위생 후 상태 확인",

"많은 친구들을 부른다"

],

answer:1,

msg:

"좋아요! 응급구조사는 먼저 감염 가능성을 고려하고 안전하게 접근합니다."

},

{

title:"상황 2",

story:
"환자가 구토 후 탈수 증상을 보인다.",

choice:[

"물만 계속 준다",

"상태 관찰 후 도움 요청",

"여럿이 가까이 모인다"

],

answer:1,

msg:

"좋아요! 증상 평가와 위생 관리가 중요합니다."

},

{

title:"상황 3",

story:
"환자가 피부 발진과 가려움을 호소한다.",

choice:[

"바로 접촉",

"청결 유지 후 상태 확인",

"아무 조치 안 함"

],

answer:1,

msg:

"좋아요! 감염 전파 예방과 초기 판단이 중요합니다."

}

];

function render(){

document
.getElementById("title")

.innerHTML

=

data[current].title;

document
.getElementById("story")

.innerHTML

=

data[current].story;

let html="";

data[current]

.choice

.forEach(

(v,i)=>

html+=

`<div class='choice'

onclick='pick(${i})'>

${v}

</div>`

);

document
.getElementById("choices")

.innerHTML

=

html;

document
.getElementById("result")

.style.display

=

"none";

document
.querySelector(".next")

.style.display

=

"none";

}

function pick(i){

let r=

document
.getElementById("result");

r.style.display=

"block";

if(

i===

data[current].answer

){

score++;

r.innerHTML=

"✅ "

+

data[current].msg;

}

else{

r.innerHTML=

"⚠ 응급구조사는 감염 위험과 환자 안전을 함께 고려합니다.";

}

document
.querySelector(".next")

.style.display

=

"block";

}

function next(){

current++;

if(

current>=

data.length

){

document
.getElementById("game")

.innerHTML=

`

<h2>

결과 완료

</h2>

<div class='score'>

🚑 응급구조사 적성

<br><br>

${score}/3

<br><br>

${
score==3

?

"감염 예방 판단 우수"

:

score==2

?

"좋은 판단"

:

"예방 개념 다시 확인"

}

</div>

`;

return;

}

render();

}

render();

</script>

</body>

</html>
