<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>응급구조사의 5분</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"맑은 고딕";
}

body{
background:black;
color:white;
overflow:hidden;
}

.page{
display:none;
width:100vw;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

.monitor{
font-size:26px;
color:#00ff99;
}

.ecg{
width:700px;
height:120px;
overflow:hidden;
}

.wave{

width:1600px;
height:4px;

background:
linear-gradient(
90deg,

#00ff99 10%,
transparent 10%,

transparent 18%,

#00ff99 18%,

#00ff99 19%,

transparent 19%

);

animation:move 3s linear infinite;

}

@keyframes move{

0%{

transform:
translateX(0);

}

100%{

transform:
translateX(-500px);

}

}

.start{

margin-top:40px;

padding:20px 80px;

border:none;

font-size:24px;

border-radius:20px;

background:#00ff99;

}

.card{

background:#111;

padding:40px;

border-radius:20px;

width:900px;

}

.timer{

font-size:42px;

color:#ff5b5b;

}

.choice{

background:#1d1d1d;

padding:20px;

margin-top:15px;

cursor:pointer;

border-radius:15px;

}

.choice:hover{

background:#333;

}

.people{

display:grid;

grid-template-columns:
repeat(5,70px);

gap:20px;

margin-top:30px;

}

.person{

width:50px;

height:50px;

border-radius:50%;

background:black;

border:4px solid white;

}

.red{

background:red;

animation:spread .5s;

}

@keyframes spread{

from{

transform:
scale(.3);

}

to{

transform:
scale(1);

}

}

.result{

margin-top:30px;

line-height:2;

}

.score{

font-size:35px;

line-height:2;

}

input{

width:600px;

padding:15px;

margin:20px;

}

button{

padding:15px 40px;

}

.answer{

margin-top:30px;

font-size:20px;

}

</style>

</head>

<body>

<!-- 시작 -->

<div
class="page active"
id="intro">

<div class="monitor">

HR 118 BPM

<br>

BP 128 / 80

<br>

SpO₂ 95%

</div>

<br>

<div class="ecg">

<div class="wave">

</div>

</div>

<button

class="start"

onclick="start()">

START

</button>

</div>



<!-- 게임 -->

<div

class="page"

id="game">

<div class="card">

<h1>

🚑 응급구조사의 5분

</h1>

<br>

<div

class="timer"

id="timer">

05:00

</div>

<br>

<h2>

상황

</h2>

<br>

학교 축제 중 학생이

38.7℃ 발열,

기침,

인후통,

피로를 호소한다.

주변 학생들과 접촉 중이다.

<br><br>

<h2>

응급구조사의 첫 행동

</h2>

<div
class="choice"

onclick="pick(1)">

① 바로 가까이 접근

</div>

<div
class="choice"

onclick="pick(2)">

② 손 위생 + 마스크 후 상태 확인

</div>

<div
class="choice"

onclick="pick(3)">

③ 친구들을 모아 이동

</div>

<div

class="people"

id="map">

</div>

<div

class="result"

id="result">

</div>

</div>

</div>



<!-- 결과 -->

<div

class="page"

id="report">

<div class="card">

<h1>

📋 응급구조사 리포트

</h1>

<br>

<div

class="score"

id="score">

</div>

<button

onclick="goChat()">

감염병 궁금증 질문하기

</button>

</div>

</div>



<!-- 챗봇 -->

<div

class="page"

id="chat">

<h1>

🧬 감염병 질문하기

</h1>

<input

id="q"

placeholder=

"예) 왜 손 씻기가 중요해?"

>

<button

onclick="ask()">

질문

</button>

<div

class="answer"

id="a">

</div>

</div>

<script>

let sec=300;

let infected=1;

let point=0;

function make(){

for(

let i=0;

i<15;

i++

){

map.innerHTML+=

"<div class='person'></div>";

}

map.children[7]

.classList.add("red");

}

make();

function start(){

intro.classList.remove("active");

game.classList.add("active");

run();

}

function run(){

setInterval(

()=>{

sec--;

let m=

String(

Math.floor(sec/60)

)

.padStart(2,"0");

let s=

String(

sec%60

)

.padStart(2,"0");

timer.innerHTML=

m+":"+s;

},

1000

);

}

function spread(){

let arr=

[

2,4,8,10,12,13

];

arr.forEach(

(v,i)=>{

setTimeout(

()=>{

map.children[v]

.classList.add(

"red"

);

},

i*500

);

}

);

}

function pick(n){

if(n===2){

point=95;

result.innerHTML=

`

🟢 감염 확산 차단 성공

<br><br>

[생명과학Ⅱ]

감염성 질환 예방은

병원체의 전파 경로를 차단하는 것이 중요하다.

비말·접촉 감염을 줄이는 행동이 필요하다.

<br><br>

[응급구조사]

현장 접근 전

감염 위험 평가와

보호장비 사용이 우선된다.

`;

}

else{

point=45;

spread();

result.innerHTML=

`

🔴 감염 확산 발생

<br><br>

[생명과학Ⅱ]

병원체는 사람 간 접촉과

비말을 통해 전파될 수 있다.

초기 예방 실패는

확산 위험을 증가시킨다.

<br><br>

[응급구조사]

응급처치 이전에

현장 안전 확보가 중요하다.

`;

}

setTimeout(

finish,

6000

);

}

function finish(){

game.classList.remove("active");

report.classList.add("active");

score.innerHTML=

`

감염 예방 점수

${point}

점

<br>

${
point>90

?

"🚑 응급구조사 판단 우수"

:

"📘 감염 예방 개념 복습 추천"

}

`;

}

function goChat(){

report.classList.remove(

"active"

);

chat.classList.add(

"active"

);

}

function ask(){

let q=

document

.getElementById("q")

.value;

let text="";

if(

q.includes("손")

)

text=

"손 위생은 접촉 감염 경로를 줄여 병원체 전파를 예방합니다.";

else if(

q.includes("백신")

)

text=

"예방접종은 항원을 미리 경험해 면역 기억 형성을 돕습니다.";

else if(

q.includes("감염")

)

text=

"감염성 질환 예방의 핵심은 전파 경로 차단입니다.";

else

text=

"응급구조사는 환자 평가와 감염 예방을 함께 수행합니다.";

a.innerHTML=text;

}

</script>

</body>

</html>
