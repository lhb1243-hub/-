<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>감염 예방 도우미</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"맑은 고딕";
}

body{

background:
linear-gradient(
135deg,
#E9FFFB,
#EAF4FF
);

}

.container{

max-width:850px;

margin:40px auto;

padding:20px;

}

.header{

background:
linear-gradient(
135deg,
#19B2A3,
#4A79D8
);

color:white;

padding:50px;

text-align:center;

border-radius:25px 25px 0 0;

}

.content{

background:white;

padding:35px;

border-radius:0 0 25px 25px;

}

.card{

background:#F8FFFE;

padding:25px;

border-radius:20px;

}

textarea{

width:100%;

height:120px;

padding:18px;

margin-top:15px;

border-radius:15px;

border:1px solid #ddd;

resize:none;

}

button{

width:100%;

padding:18px;

margin-top:20px;

border:none;

border-radius:15px;

background:#19B2A3;

color:white;

font-size:18px;

}

.result{

margin-top:20px;

padding:25px;

background:#EDFDFC;

border-radius:15px;

line-height:1.9;

}

.small{

margin-top:20px;

color:gray;

font-size:13px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🚑 감염 예방 도우미</h1>

<p>
현재 상태를 입력하면 참고용 예방 안내를 제공합니다
</p>

</div>

<div class="content">

<div class="card">

<h2>현재 상태 입력</h2>

<textarea
id="symptom"

placeholder=
"예) 몸살이 있고 목이 따갑고 콧물이 나요
예) 배가 아프고 설사를 했어요
예) 피곤하고 두통이 있어요">

</textarea>

<button onclick="analyze()">

결과 보기

</button>

<div
class="result"
id="result">

증상을 입력해주세요.

</div>

</div>

</div>

</div>

<script>

function analyze(){

let text=

document
.getElementById("symptom")

.value

.toLowerCase();

let result="";

let prevention=[];

if(

text.includes("기침")
||

text.includes("콧물")
||

text.includes("목")
||

text.includes("가래")
||

text.includes("숨")

||

text.includes("열")

){

result+=
`
<h3>🫁 호흡기 감염 관련 증상 가능성</h3>

<p>
호흡기 증상이 포함되어 있습니다.
생활 속 감염 예방 행동이 중요합니다.
</p>
`;

prevention.push(
"마스크 착용",
"손 위생",
"충분한 휴식"
);

}

if(

text.includes("설사")

||

text.includes("복통")

||

text.includes("구토")

||

text.includes("메스꺼움")

){

result+=
`
<h3>🍽 소화기 감염 예방 필요</h3>

<p>
위생 관리와 수분 보충에 신경 써보세요.
</p>
`;

prevention.push(
"음식 위생",
"물 충분히 마시기"
);

}

if(

text.includes("발진")

||

text.includes("가려움")

||

text.includes("피부")

){

result+=
`
<h3>🩹 피부 관련 증상 참고</h3>

<p>
피부 상태 변화가 있다면 청결 유지와 관찰이 필요합니다.
</p>
`;

prevention.push(
"손 접촉 최소화",
"청결 유지"
);

}

if(

text.includes("두통")

||

text.includes("몸살")

||

text.includes("피곤")

||

text.includes("무기력")

){

result+=
`
<h3>🌡 전신 증상 관찰</h3>

<p>
충분한 휴식과 상태 변화를 확인하세요.
</p>
`;

prevention.push(
"수면",
"충분한 수분 섭취"
);

}

if(

text.includes("숨쉬기")

||

text.includes("호흡곤란")

||

text.includes("의식")

){

result+=
`
<h3>🚨 즉시 도움 요청 고려</h3>

<p>
호흡·의식 관련 이상은 빠른 평가가 중요합니다.
</p>
`;

}

if(result===""){

result=
`
<h3>🔎 판단 어려움</h3>

<p>

입력된 내용만으로 특정 상황을 구분하기 어렵습니다.

</p>

`;

}

result+=

`

<hr>

<h3>예방 행동</h3>

${[...new Set(prevention)]
.map(x=>"✔ "+x)
.join("<br>")}

<div class="small">

※ 교육용 참고입니다.<br>

응급구조사는 실제 현장에서 증상 하나가 아니라 여러 정보를 종합해 초기 평가와 감염 예방을 수행합니다.

</div>

`;

document
.getElementById("result")

.innerHTML

=

result;

}

</script>

</body>

</html>
