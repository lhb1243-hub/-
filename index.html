<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>응급구조사 × 감염 예방 체험</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"맑은 고딕";
}

body{

background:
linear-gradient(
135deg,
#E8FFFA,
#EAF1FF
);

}

.container{

width:90%;

max-width:900px;

margin:40px auto;

}

.hero{

background:
linear-gradient(
135deg,
#18B49F,
#5A7CF2
);

padding:60px;

text-align:center;

color:white;

border-radius:25px;

}

.card{

background:white;

padding:25px;

margin-top:25px;

border-radius:20px;

box-shadow:0 5px 20px rgba(0,0,0,0.08);

}

h2{

color:#178E87;

margin-bottom:15px;

}

button{

padding:14px;

margin-top:10px;

border:none;

border-radius:12px;

background:#1AA698;

color:white;

width:100%;

}

input{

width:100%;

padding:15px;

margin-top:10px;

border:1px solid #ddd;

border-radius:10px;

}

.result{

margin-top:15px;

padding:20px;

background:#F4FFFD;

border-radius:15px;

}

.option{

background:#EEFDFB;

padding:15px;

margin-top:10px;

border-radius:12px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<h1>🚑 응급구조사 × 감염 예방 체험</h1>

<p>

생명과학Ⅱ 감염성 질환 예방 단원

</p>

</div>



<div class="card">

<h2>① 응급구조사 되어보기</h2>

<p>

친구가 열이 나고 기침하며 힘들어한다.

</p>

<div class="option"

onclick="choice(1)">

① 바로 부축한다

</div>

<div class="option"

onclick="choice(2)">

② 마스크 착용 후 상태 확인

</div>

<div class="option"

onclick="choice(3)">

③ 주변 사람부터 대피

</div>

<div
class="result"
id="scenario">

선택해보세요.

</div>

</div>



<div class="card">

<h2>② 감염 위험 시뮬레이터</h2>

<input

id="risk"

placeholder=

"예: 기침했고 손 안 씻음">

<button

onclick="risk()">

확인

</button>

<div

class="result"

id="riskResult">

입력 대기중

</div>

</div>



<div class="card">

<h2>③ 감염 예방 Q&A</h2>

<input

id="chat"

placeholder=

"손만 씻으면 예방되나요?">

<button

onclick="chat()">

질문하기

</button>

<div

class="result"

id="answer">

질문해보세요.

</div>

</div>



<div class="card">

<h2>④ 내 상태 체크</h2>

<input

id="state"

placeholder=

"예: 피곤하고 목이 따가움">

<button

onclick="state()">

확인

</button>

<div

class="result"

id="stateResult">

입력 대기중

</div>

</div>



<div class="card">

<h2>⑤ 오늘의 예방 미션</h2>

<button

onclick="mission()">

생성하기

</button>

<div

class="result"

id="mission">

버튼 클릭

</div>

</div>

</div>

<script>

function choice(num){

let text="";

if(num==1)

text=
"⚠ 감염 위험 고려 부족";

if(num==2)

text=
"✅ 응급구조사와 가까운 판단";

if(num==3)

text=
"🟡 상황에 따라 가능";

document
.getElementById("scenario")

.innerHTML=text;

}

function risk(){

let t=

document
.getElementById("risk")

.value;

let score=0;

if(t.includes("기침"))score++;

if(t.includes("열"))score++;

if(t.includes("손"))score++;

if(t.includes("접촉"))score++;

let result=

score>=3

?

"🔴 예방 행동 강화 권장"

:

score>=2

?

"🟡 생활 위생 강화"

:

"🟢 기본 예방 유지";

document
.getElementById("riskResult")

.innerHTML=result;

}

function chat(){

let q=

document
.getElementById("chat")

.value;

let a="";

if(q.includes("손"))

a="손 씻기는 중요하지만 단독 예방 방법은 아닙니다.";

else if(q.includes("마스크"))

a="상황에 맞게 사용하면 감염 전파 감소에 도움이 됩니다.";

else

a="감염 예방은 위생·환경·생활습관을 함께 고려합니다.";

document
.getElementById("answer")

.innerHTML=a;

}

function state(){

let t=

document
.getElementById("state")

.value;

let result="";

if(

t.includes("기침")

||

t.includes("열")

)

result=
"🫁 호흡기 증상 관찰";

else if(

t.includes("배")

||

t.includes("설사")

)

result=
"🍽 위생 관리";

else

result=
"🌱 생활 관리";

document
.getElementById("stateResult")

.innerHTML=result;

}

function mission(){

let arr=[

"✔ 손 씻기",

"✔ 물 마시기",

"✔ 환기",

"✔ 기침 예절",

"✔ 수면"

];

let random=

arr

.sort(()=>0.5-Math.random())

.slice(0,3)

.join("<br>");

document
.getElementById("mission")

.innerHTML=random;

}

</script>

</body>

</html>
