<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>응급구조사의 5분</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"맑은 고딕";
}

body{
background:#050505;
color:white;
overflow:hidden;
}

.page{
display:none;
width:100vw;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:30px;
}

.active{
display:flex;
}

/* 시작 */

.monitor{

width:90%;

max-width:1000px;

height:500px;

border:3px solid #00ff95;

border-radius:30px;

padding:40px;

box-shadow:
0 0 40px #00ff95;

}

.status{

display:flex;

justify-content:space-between;

font-size:28px;

color:#00ff95;

}

svg{

margin-top:60px;

width:100%;

height:220px;

}

.wave{

fill:none;

stroke:#00ff95;

stroke-width:4;

stroke-linecap:round;

stroke-dasharray:1800;

stroke-dashoffset:1800;

animation:draw 3s linear infinite;

}

@keyframes draw{

to{

stroke-dashoffset:0;

}

}

.start{

margin-top:50px;

padding:20px 80px;

font-size:25px;

border:none;

border-radius:20px;

background:#00ff95;

}



/* 상황 */

.story{

max-width:850px;

padding:60px;

background:#111;

border-radius:30px;

line-height:2;

font-size:26px;

}

#typing{

min-height:300px;

}

.next{

display:none;

margin-top:40px;

}



/* 문제 */

.timer{

position:absolute;

top:30px;

right:40px;

font-size:50px;

color:#ff5252;

}

.quiz{

max-width:900px;

background:#121212;

padding:50px;

border-radius:30px;

}

.choice{

background:#222;

padding:25px;

margin-top:20px;

cursor:pointer;

border-radius:20px;

}

.choice:hover{

transform:translateX(10px);

}

.people{

display:none;

margin-top:30px;

grid-template-columns:

repeat(6,60px);

gap:15px;

}

.person{

width:50px;

height:50px;

border-radius:50%;

border:3px solid white;

}

.red{

background:red;

animation:boom .5s;

}

@keyframes boom{

from{

transform:scale(.3);

}

to{

transform:scale(1);

}

}

.feedback{

margin-top:30px;

line-height:2;

}



/* 교과 */

.cards{

display:flex;

gap:40px;

align-items:center;

}

.card{

padding:50px;

border-radius:30px;

}

.center{

background:white;

color:black;

width:450px;

}

.side{

opacity:.2;

transform:scale(.7);

}



/* 챗 */

input{

width:700px;

padding:20px;

font-size:18px;

margin:20px;

}

.answer{

margin-top:30px;

background:#151515;

padding:40px;

width:850px;

border-radius:25px;

line-height:2;

}

button{

padding:18px 50px;

border:none;

border-radius:20px;

}

</style>

</head>

<body>

<div id="intro" class="page active">

<div class="monitor">

<div class="status">

<div>HR 118</div>

<div>SpO₂ 95%</div>

<div>BP 128/80</div>

</div>

<svg viewBox="0 0 1200 250">

<path
class="wave"

d="
M0 120
L160 120
L180 100
L200 120
L220 120
L240 30
L260 220
L280 120
L400 120
L420 90
L440 120
L470 20
L500 230
L530 120
L1200 120
"/>

</svg>

<button
class="start"

onclick="start()">

START

</button>

</div>

</div>



<div
id="story"

class="page">

<div class="story">

🚨 응급 출동

<div id="typing"></div>

<button

class="next"

id="go"

onclick="quiz()">

판단 시작

</button>

</div>

</div>



<div
id="game"

class="page">

<div
class="timer"

id="timer">

05:00

</div>

<div class="quiz">

<h1>

상황 1

</h1>

<br>

학교 축제 현장

학생 발열 + 기침 + 피로

주변 학생 접촉 중

<br><br>

<div
class="choice"

onclick="solve(false)">

① 바로 접근

</div>

<div
class="choice"

onclick="solve(true)">

② 손 위생 후 접근

</div>

<div
class="choice"

onclick="solve(false)">

③ 학생 이동

</div>

<div
class="people"

id="spread">

</div>

<div
class="feedback"

id="fb">

</div>

</div>

</div>



<div
id="concept"

class="page">

<h1>

🧬 생명과학Ⅱ 개념 정리

</h1>

<br>

<div class="cards">

<div class="card side">

병원체

</div>

<div class="card center">

감염 예방은

병원체의 전파 경로를

차단하는 것이다.

<br><br>

응급구조사는

환자 처치 이전에

감염 위험을 평가한다.

</div>

<div class="card side">

면역

</div>

</div>

<br>

<button

onclick="chat()">

질문하기

</button>

</div>



<div
id="chat"

class="page">

<h1>

💬 감염병 질문

</h1>

<input

id="q"

placeholder=

"질문 입력"

>

<button

onclick="ask()">

질문

</button>

<div

class="answer"

id="a">

</div>

</div>



<script>

const text=
`학교 축제 현장.
학생 1명이 고열과 기침을 보인다.

주변 학생과 접촉 중이다.

당신은 응급구조사이다.

5분 안에
감염 확산을 막아라.`;


function show(id){

document

.querySelectorAll(".page")

.forEach(

x=>

x.classList.remove("active")

);

document

.getElementById(id)

.classList.add("active");

}

function start(){

show("story");

let i=0;

let t=

setInterval(()=>{

typing.innerHTML+=text[i];

i++;

if(i===text.length){

clearInterval(t);

go.style.display="block";

}

},40);

}

function quiz(){

show("game");

}

let sec=300;

setInterval(()=>{

let m=

String(

Math.floor(sec/60)

)

.padStart(2,0);

let s=

String(

sec%60

)

.padStart(2,0);

timer.innerHTML=

m+":"+s;

sec--;

},1000);

function solve(ok){

if(ok){

fb.innerHTML=

`
🟢 성공

<br><br>

[교과]

감염 예방은

전파 경로 차단

`;

setTimeout(

()=>show("concept"),

4000

);

}

else{

spread.style.display="grid";

for(

let i=0;

i<18;

i++

){

let p=

document

.createElement("div");

p.className="person";

spread.appendChild(p);

}

let arr=

[

5,6,7,8,9,10

];

arr.forEach(

(v,i)=>{

setTimeout(

()=>{

spread.children[v]

.classList

.add("red");

},

i*500

);

}

);

fb.innerHTML=

`
🔴 확산 발생

<br><br>

잘못된 판단

`;

setTimeout(

()=>show("concept"),

6000

);

}

}

function chat(){

show("chat");

}

function ask(){

let q=

document

.getElementById("q")

.value;

let a="";

if(q.length<3)

a="질문을 조금 더 자세히 입력해줘.";

else{

a=
`
질문:

${q}

감염병은
병원체,
전파,
면역,
예방 행동을
함께 고려해야 해.

응급구조사는
초기 평가와
감염 예방을 수행해.
`;

}

document

.getElementById("a")

.innerHTML=a;

}

</script>

</body>
</html>
