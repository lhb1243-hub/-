<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMT Decision Lab</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#FAFAFA;
color:#111827;
padding:30px;
}

.container{
max-width:1300px;
margin:auto;
}

/* HERO */

.hero{
background:linear-gradient(135deg,#111827,#1F2937);
border-radius:35px;
padding:80px;
color:white;
text-align:center;
margin-bottom:40px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.hero h1{
font-size:70px;
font-weight:700;
}

.hero p{
margin-top:20px;
font-size:22px;
opacity:0.8;
}

.start-btn{
margin-top:30px;
padding:15px 30px;
background:#06B6D4;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
color:white;
}

/* sections */

.section{
display:none;
margin-top:40px;
animation:fade 0.6s ease;
}

.active{
display:block;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* cards */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:30px;
}

.card{
background:white;
padding:30px;
border-radius:25px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

.card:hover{
transform:scale(1.05);
}

.icon{
font-size:45px;
margin-bottom:10px;
}

/* simulation */

.result{
margin-top:30px;
background:white;
padding:30px;
border-radius:20px;
line-height:2;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

/* science */

.info-box{
margin-top:20px;
padding:30px;
background:#111827;
color:white;
border-radius:25px;
display:none;
}

/* flow */

.flow{
display:flex;
justify-content:space-between;
margin-top:40px;
gap:20px;
}

.flow-box{
flex:1;
background:white;
padding:30px;
text-align:center;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

.arrow{
font-size:40px;
color:#06B6D4;
display:flex;
align-items:center;
}

/* dream */

.dream{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.title{
font-size:35px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<!-- HOME -->

<div class="hero">

<h1>EMT Decision Lab</h1>

<p>
생명과학이 응급구조사를 만든다
</p>

<button class="start-btn" onclick="nextSection('simulation')">
START
</button>

</div>

<!-- SIMULATION -->

<div id="simulation" class="section">

<h2 class="title">🚨 Emergency Situation</h2>

<p>환자가 다음 증상을 보이고 있습니다</p>

<div class="grid">

<div class="card">🤒<br>고열</div>

<div class="card">😷<br>기침</div>

<div class="card">😫<br>호흡곤란</div>

<div class="card">🦠<br>바이러스 노출</div>

</div>

<button class="start-btn"
onclick="showResult()">
판단하기
</button>

<div id="resultBox"></div>

</div>


<!-- BIOLOGY -->

<div id="biology" class="section">

<h2 class="title">🧬 Biology Knowledge</h2>

<p>응급구조사가 알아야 하는 생명과학</p>

<div class="grid">

<div class="card"
onclick="showInfo('vaccine')">
💉<br>백신
</div>

<div class="card"
onclick="showInfo('immune')">
🧬<br>면역
</div>

<div class="card"
onclick="showInfo('pathogen')">
🦠<br>병원체
</div>

<div class="card"
onclick="showInfo('group')">
👥<br>집단면역
</div>

</div>

<div id="scienceInfo" class="info-box"></div>

</div>


<!-- FLOW -->

<div id="flow" class="section">

<h2 class="title">🔗 Connection</h2>

<div class="flow">

<div class="flow-box">
생명과학
</div>

<div class="arrow">→</div>

<div class="flow-box">
감염병 이해
</div>

<div class="arrow">→</div>

<div class="flow-box">
응급 판단
</div>

<div class="arrow">→</div>

<div class="flow-box">
생명 구조
</div>

</div>

</div>


<!-- DREAM -->

<div id="dream" class="section">

<h2 class="title">❤️ Why EMT?</h2>

<div class="dream">

<div class="card">

<div class="icon">🚑</div>

현장에서  
가장 먼저 행동한다

</div>

<div class="card">

<div class="icon">❤️</div>

사람의 생명을  
직접 살린다

</div>

<div class="card">

<div class="icon">🧠</div>

과학 지식을  
실제로 사용한다

</div>

</div>

</div>

</div>


<script>

function nextSection(id){
document.getElementById(id).classList.add("active");
}

function showResult(){

document.getElementById("resultBox").innerHTML=`

<div class="result">

<h3>AI 판단 결과</h3>

감염성 질환 의심 환자<br><br>

🧤 PPE 보호장비 착용<br>

💨 산소 공급 실시<br>

📞 병원에 감염 위험 전달<br>

🚑 신속한 병원 이송<br><br>

→ 응급구조사는 감염성 질환을 이해해야 한다.

</div>

`;

document.getElementById("biology").classList.add("active");

}

function showInfo(type){

let text="";

if(type=="vaccine"){
text="💉 백신 : 생백신, 사백신, 핵산백신을 통해 항체를 형성하여 감염을 예방한다.";
}

if(type=="immune"){
text="🧬 면역 : 병원체가 침입하면 우리 몸은 항체와 기억세포를 만든다.";
}

if(type=="pathogen"){
text="🦠 병원체 : 세균, 바이러스, 곰팡이 등이 질병을 일으킨다.";
}

if(type=="group"){
text="👥 집단면역 : 많은 사람이 예방접종을 받으면 전체 사회를 보호할 수 있다.";
}

document.getElementById("scienceInfo").style.display="block";

document.getElementById("scienceInfo").innerHTML=text;

document.getElementById("flow").classList.add("active");

document.getElementById("dream").classList.add("active");

}

</script>

</body>
</html>
